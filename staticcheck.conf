# staticcheck configuration
# https://staticcheck.dev/docs/configuration/

# Enable all checks, then disable the most opinionated style rules.
# SA* (correctness), S1* (simplifications), QF* (quick fixes) remain fully enabled.
checks = [
  "all",
  "-ST1000", # missing package comment
  "-ST1003", # incorrect naming conventions (handled by gofmt/goimports)
  "-ST1016", # methods on the same type should have the same receiver name
  "-ST1020", # incorrectly formatted exported function
  "-ST1021", # incorrectly formatted exported type
  "-ST1022", # incorrectly formatted exported variable/constant
  "-ST1023", # redundant type in variable declaration
]

# Recognised initialisations to be treated as all-caps identifiers.
# Extend with project-specific abbreviations as needed.
initialisms = [
  "ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID",
  "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM",
  "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL",
  "UDP", "UI", "GID", "UID", "UUID", "URI", "URL", "UTF8",
  "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP",
  "DB", "TS",
]

http_status_code_whitelist = ["200", "400", "404", "500"]
